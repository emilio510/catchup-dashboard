# config.yaml
scan:
  window_days: 7
  messages_per_chat: 20
  batch_size: 5
  max_dialogs: 50

telegram:
  session_name: akgemilio
  blacklist:
    # Automated/monitoring bots
    - "Hypernative Alerts"
    - "TokenLogic & HypernativeBOT"
    - "Kelp Fluid Position Monitroing"
    - "Sky PSM monitoring"
    - "Monitoring Alerts"
    - "Hypernative Sprint"
    # Public communities (noise)
    - "DeFi Francophone 🇫🇷"
    - "LobsterDAO 🦞"
    - "Club Gearbox DAO"
    - "Tokenised RWA - General Discussion"
    - "ACI Support"
    - "Exploring Sonic DeFi Spaces"
    # Archive/dead/test
    - "[Archive] Ethena <> Aave"
    - "Entropy <> Renzo (delete)"
    - "TEST - Arbitrum Foundation"
    - "DeFi News Channel"
    # Event/travel chats
    - "ETHcc 2026 Team Chat"
    - "ETHcc Cannes Group Chat"
    - "Cannes 2026"
    - "GA ETHCC"
    - "BKK novembre"
    - "GA in BKK"
    - "Seoul"
    - "Token2049"
    - "Stellar <> Defi Day ETHcc"
    # Marketing-only groups
    - "AAVE <> Bitget Wallet (Marketing)"
    - "AAVE <> Bitget Wallet Marketing"
    - "Origami <> Aave Marketing"
    - "Maple <> Aave (Marketing)"
    - "Aave <> Celo - Marketing"
    - "Aave <> Celo - marketing"
    - "Marketing - Metamask <> Aave"
    - "Marketing - Aave 🤝 Balancer"
    - "Media - OKX <> Aave"
    - "Aave Marketing <> GRVT"
    # Internal design/social (low urgency)
    - "TokenLogic Graphic Design"
    - "TokenLogic Social Media"
    - "TokenLogic Website"
    - "Brand Discussion"
    # Misc no-action
    - "0xAI Terminal"
    - "Aave <> Chainlink - SVR recapture tracker"
    - "searcher.dev"
    - "Lido V3 :: stVaults"
  bot_whitelist: []

classification:
  model: claude-sonnet-4-20250514
  max_tokens: 4096
  rate_limit_rpm: 30
  user_context: |
    I work at TokenLogic (Aave treasury/service provider).
    Building Logic Protocol (cross-chain yield product).
    Key collaborators: StraitsX, Mantle, Aave governance participants.
    I manage incentive programs, vault development, and governance proposals.

    Team context (important for classification):
    - Matthew Graham is my boss and co-founder of TokenLogic. If he already answered
      in a chat, treat it as if I answered -- the ball is NOT in my court.
    - efecarranza (Efe) is my lead developer. He handles technical questions on our
      behalf. If he answered a technical question, I don't need to respond.
    - When classifying, if Matthew or Efe already responded to the other party's
      message, lower the priority or mark as MONITORING -- they covered it.

    My identity in chats:
    - Telegram username: @AkgEmilio
    - Display name: "AkgEmilio | TokenLogic" or "Emile"
    - If someone @mentions me, replies to my message, or addresses me by name
      ("Emile", "AkgEmilio", "Emilio"), that is a DIRECT ping -- boost priority.
    - In group chats, distinguish between messages directed at me specifically vs.
      general group discussion. A @AkgEmilio mention = P0/P1. A general group
      question not directed at me = P2/P3.

output:
  telegram_digest: true
  json_file: scan_results.json
  # database_url: set via DATABASE_URL env var
  dashboard_url: https://catchup-dashboard-akgemilio.vercel.app
  digest_chat_id: 1744950707  # Your Telegram user ID (bot sends TO you)
  # digest_bot_token: set via DIGEST_BOT_TOKEN env var

calendar:
  enabled: false  # Set to true after OAuth setup
  credentials_path: credentials.json
  token_path: token.json
  days_ahead: 7
